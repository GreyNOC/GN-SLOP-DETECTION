name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          # setup-node@v5 enables package-manager caching by default; pin it
          # explicitly so behavior is deterministic (root package-lock.json).
          cache: npm

      - name: Install Node dependencies
        run: npm install

      - name: Check Electron entry point
        run: node --check electron/main.js
